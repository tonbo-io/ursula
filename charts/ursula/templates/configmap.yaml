{{- include "ursula.validateEntrypointConfig" . -}}
{{- $fullname := include "ursula.fullname" . -}}
{{- $headless := include "ursula.headlessServiceName" . -}}
{{- $namespace := .Release.Namespace -}}
{{- $clusterDomain := .Values.global.clusterDomain | toString -}}
{{- $clientPort := .Values.server.ports.client | int -}}
{{- $replicaCount := .Values.server.replicaCount | int -}}
{{- $peers := list -}}
{{- $nodes := list -}}
{{- range $i := until $replicaCount -}}
{{- $podName := printf "%s-%d" $fullname $i -}}
{{- $host := printf "%s.%s.%s.svc.%s" $podName $headless $namespace $clusterDomain -}}
{{- $clientUrl := printf "http://%s:%d" $host $clientPort -}}
{{- $nodeId := add1 $i -}}
{{- $peers = append $peers (dict "node_id" $nodeId "url" $clientUrl) -}}
{{- $nodes = append $nodes (dict "id" $nodeId "http_url" $clientUrl "host" $host "name" $podName) -}}
{{- end -}}
{{- $s3Bucket := .Values.s3.bucket | toString -}}
{{- $s3Region := .Values.s3.region | toString -}}
{{- $s3Endpoint := .Values.s3.endpoint | toString -}}
{{- $s3Prefix := .Values.s3.prefix | toString -}}
{{- $coldRoot := include "ursula.joinPath" (list $s3Prefix .Values.coldStorage.prefix) -}}
{{- $hasS3Credentials := include "ursula.hasS3Credentials" . -}}
{{- $coldFlushIntervalMs := .Values.coldStorage.flush.intervalMs | int64 -}}
{{- $coldFlushMinHotBytes := .Values.coldStorage.flush.minHotBytes | int64 -}}
{{- $coldFlushMaxBytes := .Values.coldStorage.flush.maxBytes | int64 -}}
{{- $coldFlushMaxConcurrency := .Values.coldStorage.flush.maxConcurrency | int64 -}}
{{- $coldMaxHotBytesPerGroup := .Values.coldStorage.flush.maxHotBytesPerGroup | int64 -}}
{{- $coldCompaction := .Values.coldStorage.compaction | default dict -}}
{{- $coldCompactionEnabled := $coldCompaction.enabled | default false -}}
{{- $coldCompactionIntervalMs := $coldCompaction.intervalMs | default 30000 | int64 -}}
{{- $coldCompactionTargetBytes := $coldCompaction.targetBytes | default 8388608 | int64 -}}
{{- $coldCompactionMaxBytes := $coldCompaction.maxBytes | default 16777216 | int64 -}}
{{- $coldCompactionMaxStreamsPerPass := $coldCompaction.maxStreamsPerPass | default 16 | int64 -}}
{{- $coldCompactionGcGraceMs := $coldCompaction.gcGraceMs | default 300000 | int64 -}}
{{- $coldCache := .Values.coldStorage.cache | default dict -}}
{{- $coldCacheMaxSizeBytes := $coldCache.maxSizeBytes -}}
{{- $coldCacheBlockSizeBytes := $coldCache.blockSizeBytes -}}
{{- $coldCacheReadaheadBlocks := $coldCache.readaheadBlocks -}}
{{- $snapshotDriveIntervalMs := .Values.snapshotStore.driveIntervalMs -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ursula.fullname" . }}
  labels:
    {{- include "ursula.labels" . | nindent 4 }}
data:
  ursula-entrypoint.sh: |
    #!/bin/sh
    set -eu

    replica_count={{ $replicaCount }}

    hostname="${HOSTNAME:-$(hostname)}"
    ordinal="${hostname##*-}"
    case "${ordinal}" in
      ''|*[!0-9]*)
        echo "cannot derive StatefulSet ordinal from HOSTNAME=${hostname}" >&2
        exit 1
        ;;
    esac

    node_id=$((ordinal + 1))
    if [ "${node_id}" -gt "${replica_count}" ]; then
      echo "derived node_id=${node_id} exceeds replica_count=${replica_count}" >&2
      exit 1
    fi

    config_dir="/etc/ursula/generated"
    config_path="${config_dir}/ursula.toml"
    mkdir -p "${config_dir}"

    # Restrict generated config permissions: it may contain S3 credentials.
    old_umask=$(umask)
    umask 077

    toml_string() {
      printf '%s' "$1" | tr -d '\n\r' | sed 's/\\/\\\\/g; s/"/\\"/g'
    }

    cat > "${config_path}" <<EOF
    [server]
    listen = "0.0.0.0:{{ $clientPort }}"

    [runtime]
    core_count = {{ .Values.server.coreCount }}

    [raft]
    group_count = {{ .Values.raft.groupCount }}
    init_membership = {{ .Values.raft.initMembership }}
    init_membership_per_group = {{ .Values.raft.initMembershipPerGroup }}
    max_in_snapshot_log_to_keep = {{ .Values.raft.maxInSnapshotLogToKeep }}
{{- if not (eq .Values.raft.maxUncommittedBytesPerGroup nil) }}
    max_uncommitted_size_per_group = "{{ .Values.raft.maxUncommittedBytesPerGroup }}"
{{- end }}
{{- range $peers }}
    [[raft.peers]]
    node_id = {{ .node_id }}
    url = {{ .url | quote }}
{{- end }}

    [raft.wal]
{{- if .Values.raft.storageMode | eq "memory" }}
    backend = "memory"
{{- else }}
    backend = "disk"
    path = {{ .Values.raft.logDir | quote }}
{{- end }}

    [storage.cold]
{{- if .Values.coldStorage.enabled }}
    backend = {{ .Values.coldStorage.backend | quote }}
{{- if $coldRoot }}
    root = {{ $coldRoot | quote }}
{{- end }}
    flush_interval = "{{ $coldFlushIntervalMs }}ms"
    flush_size = "{{ $coldFlushMaxBytes }}"
    flush_min_hot_size = "{{ $coldFlushMinHotBytes }}"
    flush_max_size = "{{ $coldFlushMaxBytes }}"
    flush_max_concurrency = {{ $coldFlushMaxConcurrency }}
    max_hot_size_per_group = "{{ $coldMaxHotBytesPerGroup }}"
    compaction_enabled = {{ $coldCompactionEnabled }}
    compaction_interval = "{{ $coldCompactionIntervalMs }}ms"
    compaction_target_size = "{{ $coldCompactionTargetBytes }}"
    compaction_max_size = "{{ $coldCompactionMaxBytes }}"
    compaction_max_streams_per_pass = {{ $coldCompactionMaxStreamsPerPass }}
    compaction_gc_grace = "{{ $coldCompactionGcGraceMs }}ms"
{{- if or (not (eq $coldCacheMaxSizeBytes nil)) (not (eq $coldCacheBlockSizeBytes nil)) (not (eq $coldCacheReadaheadBlocks nil)) }}

    [storage.cold.cache]
{{- if not (eq $coldCacheMaxSizeBytes nil) }}
    max_size = "{{ $coldCacheMaxSizeBytes }}"
{{- end }}
{{- if not (eq $coldCacheBlockSizeBytes nil) }}
    block_size = "{{ $coldCacheBlockSizeBytes }}"
{{- end }}
{{- if not (eq $coldCacheReadaheadBlocks nil) }}
    readahead_blocks = {{ $coldCacheReadaheadBlocks }}
{{- end }}
{{- end }}
{{- else }}
    backend = "none"
{{- end }}
{{- if or .Values.coldStorage.enabled (eq .Values.snapshotStore.backend "s3") }}

    [storage.cold.s3]
    bucket = {{ $s3Bucket | quote }}
{{- if $s3Region }}
    region = {{ $s3Region | quote }}
{{- end }}
{{- if $s3Endpoint }}
    endpoint = {{ $s3Endpoint | quote }}
{{- end }}
{{- if $hasS3Credentials }}
    access_key_id = "$(toml_string "${URSULA_COLD_S3_ACCESS_KEY_ID:-}")"
    secret_access_key = "$(toml_string "${URSULA_COLD_S3_SECRET_ACCESS_KEY:-}")"
    session_token = "$(toml_string "${URSULA_COLD_S3_SESSION_TOKEN:-}")"
{{- end }}
{{- end }}

    [storage.snapshot]
{{- if .Values.snapshotStore.backend | eq "s3" }}
    backend = "s3"
    s3_prefix = {{ .Values.snapshotStore.prefix | quote }}
{{- else }}
    backend = "inline"
{{- end }}
{{- if not (eq $snapshotDriveIntervalMs nil) }}
    drive_interval = "{{ $snapshotDriveIntervalMs }}ms"
{{- end }}
    EOF

    chmod 600 "${config_path}"
    umask "${old_umask}"

    exec /usr/local/bin/ursula --config "${config_path}" --node-id "${node_id}" "$@"
  cluster-manifest.json: |
{{ dict "nodes" $nodes | toPrettyJson | indent 4 }}
