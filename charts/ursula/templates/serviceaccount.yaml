{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ursula.serviceAccountName" . }}
  labels:
    {{- include "ursula.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- if and .Values.indexer.enabled .Values.indexer.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ursula.indexerServiceAccountName" . }}
  labels:
    {{- include "ursula.labels" . | nindent 4 }}
    app.kubernetes.io/component: indexer
  {{- with .Values.indexer.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.indexer.serviceAccount.automountServiceAccountToken }}
{{- end }}
