{{- if and .Values.indexer.enabled .Values.indexer.networkPolicy.enabled -}}
{{- $root := . -}}
{{- range $instance := .Values.indexer.instances }}
{{- $context := dict "root" $root "name" $instance.name -}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ursula.indexerFullname" $context }}
  labels:
    {{- include "ursula.indexerLabels" $context | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ursula.indexerSelectorLabels" $context | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $root.Release.Namespace | quote }}
      ports:
        - protocol: TCP
          port: {{ $root.Values.indexer.ports.http }}
    {{- with $root.Values.indexer.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    - {}
{{- end }}
{{- end }}
