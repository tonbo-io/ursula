  docs:
    name: Docs build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: docs/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build
