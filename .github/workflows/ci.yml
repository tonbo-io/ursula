name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  infrastructure:
    name: OpenTofu and Helm
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.12.4

      - name: Validate EKS prerequisites
        run: |
          tofu fmt -check -recursive deploy/eks
          tofu -chdir=deploy/eks init -backend=false
          tofu -chdir=deploy/eks validate
          tofu -chdir=deploy/chaos-eks init -backend=false
          tofu -chdir=deploy/chaos-eks validate

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Validate Helm chart
        run: |
          helm lint charts/ursula
          helm template ursula charts/ursula --namespace ursula -f charts/ursula/examples/production-eks.yaml >/dev/null
          python3 scripts/helm_template_test.py
          helm lint charts/ursula-chaos
          helm template ursula-chaos charts/ursula-chaos --namespace ursula >/dev/null
          python3 scripts/chaos_helm_template_test.py

  rust-lint:
    name: Rust lint
    runs-on: depot-ubuntu-24.04-16
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - depot-ubuntu-24.04-16
          - depot-ubuntu-24.04-arm-16
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Test workspace units and binaries
        run: cargo test --workspace --lib --bins

      - name: Test runtime integration
        run: cargo test -p ursula-runtime --test s3_cold_path

      - name: Test static cluster integration
        run: cargo test -p ursula --test static_cluster_cli

      - name: Test workspace docs
        run: cargo test --workspace --doc

  deterministic-simulation:
    name: Deterministic simulation smoke
    runs-on: depot-ubuntu-24.04-16
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Audit DST guards (all 7 audits)
        run: python3 -m scripts.dst all

      - name: Run madsim smoke corpus and PR seed set
        run: |
          RUSTFLAGS="--cfg madsim" cargo test -p ursula-sim smoke_corpus_replays -- --nocapture
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- smoke \
            --failure-dir target/ursula-sim-failures \
            --seed-range 60..=64 \
            --seed-range 137..=140 \
            --seed-family http-protocol-surface-randomized \
            --seed-family runtime-raft-network-cold-live-write-recovery \
            --seed-family runtime-interleaving
          mkdir -p target/ursula-sim-seed-146-cold-write-delay-minimize
          jq '.[] | select(.schedule.seed == 146)' crates/ursula-sim/corpus/schedule-smoke.json \
            > target/ursula-sim-seed-146-cold-write-delay-minimize/seed-146-record.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- minimize \
            --artifact target/ursula-sim-seed-146-cold-write-delay-minimize/seed-146-record.json \
            --event runtime_raft_network_cold_write_delay_verified \
            --event-min-count 1 \
            --output target/ursula-sim-seed-146-cold-write-delay-minimize/seed-146-minimized.json
          jq -e '
            .minimized.outcome.target_preserved == true
            and .minimized.outcome.status == "passed"
            and (.minimized.record != null)
            and (.minimized.schedule.fault_plan.steps[0].action.plan.stream_count == 1)
            and (.minimized.schedule.fault_plan.steps[2].action.delay_ms == 1)
          ' target/ursula-sim-seed-146-cold-write-delay-minimize/seed-146-minimized.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- assert-shape \
            --artifact target/ursula-sim-seed-146-cold-write-delay-minimize/seed-146-minimized.json \
            --steps-exact RunRuntimeRaftNetworkWorkload,VerifyRuntimeColdLiveReads,DelayNextColdWrite
          jq '.minimized.record' target/ursula-sim-seed-146-cold-write-delay-minimize/seed-146-minimized.json \
            > target/ursula-sim-seed-146-cold-write-delay-minimize/seed-146-minimized-record.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- replay \
            --artifact target/ursula-sim-seed-146-cold-write-delay-minimize/seed-146-minimized-record.json
          mkdir -p target/ursula-sim-seed-147-cold-read-delay-minimize
          jq '.[] | select(.schedule.seed == 147)' crates/ursula-sim/corpus/schedule-smoke.json \
            > target/ursula-sim-seed-147-cold-read-delay-minimize/seed-147-record.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- minimize \
            --artifact target/ursula-sim-seed-147-cold-read-delay-minimize/seed-147-record.json \
            --event runtime_raft_network_cold_read_delay_verified \
            --event-min-count 1 \
            --output target/ursula-sim-seed-147-cold-read-delay-minimize/seed-147-minimized.json
          jq -e '
            .minimized.outcome.target_preserved == true
            and .minimized.outcome.status == "passed"
            and (.minimized.record != null)
            and (.minimized.schedule.fault_plan.steps[0].action.plan.stream_count == 1)
            and (.minimized.schedule.fault_plan.steps[2].action.delay_ms == 1)
          ' target/ursula-sim-seed-147-cold-read-delay-minimize/seed-147-minimized.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- assert-shape \
            --artifact target/ursula-sim-seed-147-cold-read-delay-minimize/seed-147-minimized.json \
            --steps-exact RunRuntimeRaftNetworkWorkload,VerifyRuntimeColdLiveReads,DelayNextColdRead
          jq '.minimized.record' target/ursula-sim-seed-147-cold-read-delay-minimize/seed-147-minimized.json \
            > target/ursula-sim-seed-147-cold-read-delay-minimize/seed-147-minimized-record.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- replay \
            --artifact target/ursula-sim-seed-147-cold-read-delay-minimize/seed-147-minimized-record.json
          mkdir -p target/ursula-sim-seed-155-leader-cold-live-replay
          jq '.[] | select(.schedule.seed == 155)' crates/ursula-sim/corpus/schedule-smoke.json \
            > target/ursula-sim-seed-155-leader-cold-live-replay/seed-155-record.json
          jq -e '
            ([.schedule.fault_plan.steps[].action.action] | index("stop_current_leader") != null)
            and ([.schedule.fault_plan.steps[].action.action] | index("restart_stopped_leader") != null)
            and ([.schedule.fault_plan.steps[].action.action] | index("verify_runtime_cold_live_reads") != null)
            and (.outcome.trace.events | any(.event == "runtime_raft_network_leader_failover_cold_live_read_verified" and .stream_count == 3 and .flushed_count == 12))
            and ([.outcome.trace.events[] | select(.event == "runtime_raft_network_leader_failover_stage_reached") | .stage] == [
              "old_leader_stopped",
              "replacement_leader_installed",
              "failover_appends_applied",
              "old_leader_caught_up",
              "cold_flush_started_after_failover",
              "cold_flush_applied_after_failover"
            ])
          ' target/ursula-sim-seed-155-leader-cold-live-replay/seed-155-record.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- replay \
            --artifact target/ursula-sim-seed-155-leader-cold-live-replay/seed-155-record.json
          mkdir -p target/ursula-sim-seed-155-leader-cold-live-minimize
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- minimize \
            --artifact target/ursula-sim-seed-155-leader-cold-live-replay/seed-155-record.json \
            --event runtime_raft_network_leader_failover_cold_live_read_verified \
            --event-min-count 1 \
            --output target/ursula-sim-seed-155-leader-cold-live-minimize/seed-155-minimized.json
          # DoD #6: typed shape assertion. Renaming a SimFaultAction variant
          # breaks the matches! pattern in `ursula-sim assert-shape` at compile
          # time, not just here at CI time. The jq -e left below only checks
          # the report wrapper structure, never SimFaultAction discriminants.
          jq -e '
            .minimized.outcome.target_preserved == true
            and .minimized.outcome.status == "passed"
            and (.minimized.record != null)
            and (.minimized.schedule.fault_plan.steps[2].action.plan.stream_count == 1)
            and (.minimized.schedule.fault_plan.steps[2].action.plan.append_batch_lens == [1])
            and (.minimized.schedule.fault_plan.steps[2].action.plan.failover_batch_lens == [1])
            and (.minimized.record.outcome.trace.events | any(.event == "runtime_raft_network_leader_failover_cold_live_read_verified" and .stream_count == 1))
          ' target/ursula-sim-seed-155-leader-cold-live-minimize/seed-155-minimized.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- assert-shape \
            --artifact target/ursula-sim-seed-155-leader-cold-live-minimize/seed-155-minimized.json \
            --shape seed_155_leader_cold_live_minimized
          jq '.minimized.record' target/ursula-sim-seed-155-leader-cold-live-minimize/seed-155-minimized.json \
            > target/ursula-sim-seed-155-leader-cold-live-minimize/seed-155-minimized-record.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- replay \
            --artifact target/ursula-sim-seed-155-leader-cold-live-minimize/seed-155-minimized-record.json

      - name: Verify expected-failure replay and minimization
        run: |
          assert_minimized_failure_trace() {
            artifact="$1"
            invariant="$2"
            jq -e --arg invariant "$invariant" '
              .minimized.outcome.target_preserved == true
              and .minimized.outcome.status == "reproduced_panic"
              and (.minimized.failure != null)
              and (.minimized.failure.stable_trace.events | length > 0)
              and (.minimized.failure.stable_trace.events | any(.event == "invariant_failed" and .invariant == $invariant))
              and ((.minimized.failure.raw_event_log | length) >= (.minimized.failure.stable_trace.events | length))
            ' "$artifact"
          }

          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- smoke \
            --seed-family runtime-interleaving-write-failures \
            --expect-failures \
            --failure-dir target/ursula-sim-runtime-interleaving-write-expected-failures
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- minimize \
            --artifact target/ursula-sim-runtime-interleaving-write-expected-failures/seed-192-failure.json \
            --invariant runtime_interleaving_cold_write_integrity \
            --output target/ursula-sim-runtime-interleaving-write-expected-failures/seed-192-minimized.json
          jq -e '
            .minimized.outcome.target_preserved == true
            and .minimized.outcome.status == "reproduced_panic"
            and (.minimized.failure != null)
            and ([.minimized.schedule.fault_plan.steps[].action.action] == ["run_runtime_seeded_interleaving"])
            and (.minimized.schedule.fault_plan.steps[0].action.plan.clients | length == 1)
            and (.minimized.schedule.fault_plan.steps[0].action.plan.clients[0].client_id == 0)
            and (.minimized.schedule.fault_plan.steps[0].action.plan.clients[0].stream_index == 0)
            and (.minimized.schedule.fault_plan.steps[0].action.plan.clients[0].first_append_delay_ms == 0)
            and (.minimized.schedule.fault_plan.steps[0].action.plan.clients[0].second_append_delay_ms == 0)
            and (.minimized.schedule.fault_plan.steps[0].action.plan.flush_delay_ms == 0)
            and (.minimized.schedule.fault_plan.steps[0].action.plan.read_verify_delay_ms == 0)
            and (.minimized.schedule.fault_plan.steps[0].action.plan.flush_group_limit == 1)
            and (.minimized.schedule.fault_plan.steps[0].action.plan.runtime_cold_write_failure == "seeded runtime cold write fault for seed 192")
          ' target/ursula-sim-runtime-interleaving-write-expected-failures/seed-192-minimized.json
          assert_minimized_failure_trace target/ursula-sim-runtime-interleaving-write-expected-failures/seed-192-minimized.json runtime_interleaving_cold_write_integrity
          jq '.minimized.failure' target/ursula-sim-runtime-interleaving-write-expected-failures/seed-192-minimized.json \
            > target/ursula-sim-runtime-interleaving-write-expected-failures/seed-192-minimized-failure.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- replay \
            --artifact target/ursula-sim-runtime-interleaving-write-expected-failures/seed-192-minimized-failure.json \
            --expect-invariant runtime_interleaving_cold_write_integrity
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- smoke \
            --seed-family pipeline-smoke-runtime-raft-network-randomized-read-corruption \
            --expect-failures \
            --failure-dir target/ursula-sim-expected-failures
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- minimize \
            --artifact target/ursula-sim-expected-failures/seed-244-failure.json \
            --invariant runtime_raft_network_read_your_write \
            --output target/ursula-sim-expected-failures/seed-244-minimized.json
          jq -e '
            .minimized.outcome.target_preserved == true
            and .minimized.outcome.status == "reproduced_panic"
            and (.minimized.failure != null)
            and ([.minimized.schedule.fault_plan.steps[].action.action] == ["run_runtime_raft_network_workload"])
            and (.minimized.schedule.fault_plan.steps[0].action.plan.corrupt_read_expectation == true)
          ' target/ursula-sim-expected-failures/seed-244-minimized.json
          assert_minimized_failure_trace target/ursula-sim-expected-failures/seed-244-minimized.json runtime_raft_network_read_your_write
          jq '.minimized.failure' target/ursula-sim-expected-failures/seed-244-minimized.json \
            > target/ursula-sim-expected-failures/seed-244-minimized-failure.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- replay \
            --artifact target/ursula-sim-expected-failures/seed-244-minimized-failure.json \
            --expect-invariant runtime_raft_network_read_your_write
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- smoke \
            --seed-family pipeline-smoke-runtime-raft-network-partial-read-corruption \
            --expect-failures \
            --failure-dir target/ursula-sim-partial-read-expected-failures
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- minimize \
            --artifact target/ursula-sim-partial-read-expected-failures/seed-248-failure.json \
            --invariant runtime_raft_network_partial_read_integrity \
            --output target/ursula-sim-partial-read-expected-failures/seed-248-minimized.json
          jq -e '
            .minimized.outcome.target_preserved == true
            and .minimized.outcome.status == "reproduced_panic"
            and (.minimized.failure != null)
            and ([.minimized.schedule.fault_plan.steps[].action.action] == ["run_runtime_raft_network_workload"])
            and (.minimized.schedule.fault_plan.steps[0].action.plan.partial_reads == true)
            and (.minimized.schedule.fault_plan.steps[0].action.plan.corrupt_partial_read_expectation == true)
          ' target/ursula-sim-partial-read-expected-failures/seed-248-minimized.json
          assert_minimized_failure_trace target/ursula-sim-partial-read-expected-failures/seed-248-minimized.json runtime_raft_network_partial_read_integrity
          jq '.minimized.failure' target/ursula-sim-partial-read-expected-failures/seed-248-minimized.json \
            > target/ursula-sim-partial-read-expected-failures/seed-248-minimized-failure.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- replay \
            --artifact target/ursula-sim-partial-read-expected-failures/seed-248-minimized-failure.json \
            --expect-invariant runtime_raft_network_partial_read_integrity
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- smoke \
            --seed-family pipeline-smoke-runtime-raft-network-tail-read-corruption \
            --expect-failures \
            --failure-dir target/ursula-sim-tail-read-expected-failures
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- minimize \
            --artifact target/ursula-sim-tail-read-expected-failures/seed-337-failure.json \
            --invariant runtime_raft_network_tail_read_empty \
            --output target/ursula-sim-tail-read-expected-failures/seed-337-minimized.json
          jq -e '
            .minimized.outcome.target_preserved == true
            and .minimized.outcome.status == "reproduced_panic"
            and (.minimized.failure != null)
          ' target/ursula-sim-tail-read-expected-failures/seed-337-minimized.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- assert-shape \
            --artifact target/ursula-sim-tail-read-expected-failures/seed-337-minimized.json \
            --shape seed_337_runtime_raft_network_tail_read_corruption_minimized
          assert_minimized_failure_trace target/ursula-sim-tail-read-expected-failures/seed-337-minimized.json runtime_raft_network_tail_read_empty
          jq '.minimized.failure' target/ursula-sim-tail-read-expected-failures/seed-337-minimized.json \
            > target/ursula-sim-tail-read-expected-failures/seed-337-minimized-failure.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- replay \
            --artifact target/ursula-sim-tail-read-expected-failures/seed-337-minimized-failure.json \
            --expect-invariant runtime_raft_network_tail_read_empty
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- smoke \
            --seed-family pipeline-smoke-runtime-raft-network-close-state-corruption \
            --expect-failures \
            --failure-dir target/ursula-sim-close-expected-failures
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- minimize \
            --artifact target/ursula-sim-close-expected-failures/seed-342-failure.json \
            --invariant runtime_raft_network_close_state \
            --output target/ursula-sim-close-expected-failures/seed-342-minimized.json
          jq -e '
            .minimized.outcome.target_preserved == true
            and .minimized.outcome.status == "reproduced_panic"
            and (.minimized.failure != null)
          ' target/ursula-sim-close-expected-failures/seed-342-minimized.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- assert-shape \
            --artifact target/ursula-sim-close-expected-failures/seed-342-minimized.json \
            --shape seed_342_runtime_raft_network_close_state_corruption_minimized
          assert_minimized_failure_trace target/ursula-sim-close-expected-failures/seed-342-minimized.json runtime_raft_network_close_state
          jq '.minimized.failure' target/ursula-sim-close-expected-failures/seed-342-minimized.json \
            > target/ursula-sim-close-expected-failures/seed-342-minimized-failure.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- replay \
            --artifact target/ursula-sim-close-expected-failures/seed-342-minimized-failure.json \
            --expect-invariant runtime_raft_network_close_state
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- smoke \
            --seed-family pipeline-smoke-runtime-raft-network-snapshot-corruption \
            --expect-failures \
            --failure-dir target/ursula-sim-snapshot-expected-failures
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- minimize \
            --artifact target/ursula-sim-snapshot-expected-failures/seed-347-failure.json \
            --invariant runtime_raft_network_snapshot_publish_read \
            --output target/ursula-sim-snapshot-expected-failures/seed-347-minimized.json
          jq -e '
            .minimized.outcome.target_preserved == true
            and .minimized.outcome.status == "reproduced_panic"
            and (.minimized.failure != null)
            and ([.minimized.schedule.fault_plan.steps[].action.action] == ["run_runtime_raft_network_workload"])
            and (.minimized.schedule.fault_plan.steps[0].action.plan.publish_snapshots == true)
            and (.minimized.schedule.fault_plan.steps[0].action.plan.corrupt_snapshot_expectation == true)
          ' target/ursula-sim-snapshot-expected-failures/seed-347-minimized.json
          assert_minimized_failure_trace target/ursula-sim-snapshot-expected-failures/seed-347-minimized.json runtime_raft_network_snapshot_publish_read
          jq '.minimized.failure' target/ursula-sim-snapshot-expected-failures/seed-347-minimized.json \
            > target/ursula-sim-snapshot-expected-failures/seed-347-minimized-failure.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- replay \
            --artifact target/ursula-sim-snapshot-expected-failures/seed-347-minimized-failure.json \
            --expect-invariant runtime_raft_network_snapshot_publish_read
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- smoke \
            --seed-family pipeline-smoke-runtime-raft-network-leader-failover-read-corruption \
            --expect-failures \
            --failure-dir target/ursula-sim-leader-failover-read-expected-failures
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- minimize \
            --artifact target/ursula-sim-leader-failover-read-expected-failures/seed-253-failure.json \
            --invariant runtime_raft_network_leader_failover_no_loss_or_dup \
            --output target/ursula-sim-leader-failover-read-expected-failures/seed-253-minimized.json
          jq -e '
            .minimized.outcome.target_preserved == true
            and .minimized.outcome.status == "reproduced_panic"
            and (.minimized.failure != null)
            and (.minimized.schedule.fault_plan.steps[2].action.plan.corrupt_leader_failover_read_expectation == true)
          ' target/ursula-sim-leader-failover-read-expected-failures/seed-253-minimized.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- assert-shape \
            --artifact target/ursula-sim-leader-failover-read-expected-failures/seed-253-minimized.json \
            --steps-exact StopCurrentLeader,RestartStoppedLeader,RunRuntimeRaftNetworkWorkload
          assert_minimized_failure_trace target/ursula-sim-leader-failover-read-expected-failures/seed-253-minimized.json runtime_raft_network_leader_failover_no_loss_or_dup
          jq '.minimized.failure' target/ursula-sim-leader-failover-read-expected-failures/seed-253-minimized.json \
            > target/ursula-sim-leader-failover-read-expected-failures/seed-253-minimized-failure.json
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- replay \
            --artifact target/ursula-sim-leader-failover-read-expected-failures/seed-253-minimized-failure.json \
            --expect-invariant runtime_raft_network_leader_failover_no_loss_or_dup
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- smoke \
            --seed-family runtime-raft-network-leader-failover-cold-live-read-failures \
            --expect-failures \
            --failure-dir target/ursula-sim-leader-failover-cold-live-read-expected-failures
          RUSTFLAGS="--cfg madsim" cargo run -p ursula-sim --bin ursula-sim -- minimize \
