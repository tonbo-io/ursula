name: Helm Publish

on:
  pull_request:
    paths:
      - .github/workflows/helm-publish.yml
      - charts/ursula/**
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CHART_DIR: charts/ursula
  CHART_PACKAGE_DIR: dist/charts
  CHART_REGISTRY: oci://ghcr.io/${{ github.repository_owner }}/charts

jobs:
  helm:
    name: Helm chart
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint "$CHART_DIR" --strict

      - name: Render chart
        run: helm template ursula "$CHART_DIR" >/tmp/ursula-chart-rendered.yaml

      - name: Test chart guardrails
        run: python3 scripts/helm_template_test.py

      - name: Render production EKS example
        run: helm template ursula "$CHART_DIR" --namespace ursula -f "$CHART_DIR/examples/production-eks.yaml" >/tmp/ursula-production-eks.yaml

      - name: Package chart
        id: package
        run: |
          mkdir -p "$CHART_PACKAGE_DIR"

          package_args=()
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            chart_version="$(awk '$1 == "version:" {print $2; exit}' "$CHART_DIR/Chart.yaml")"
            app_version="$(awk '$1 == "appVersion:" {gsub(/"/, "", $2); print $2; exit}' "$CHART_DIR/Chart.yaml")"
            test "$chart_version" = "$tag_version"
            test "$app_version" = "$tag_version"
            package_args+=(--version "$tag_version" --app-version "$tag_version")
          fi

          helm package "$CHART_DIR" --destination "$CHART_PACKAGE_DIR" "${package_args[@]}"
          package="$(find "$CHART_PACKAGE_DIR" -maxdepth 1 -type f -name 'ursula-*.tgz' | sort | tail -n 1)"
          test -n "$package"
          echo "package=$package" >>"$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.ref_type == 'tag'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Push chart to GHCR
        if: github.ref_type == 'tag'
        run: helm push "${{ steps.package.outputs.package }}" "$CHART_REGISTRY"
