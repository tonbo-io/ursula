syntax = "proto3";

package ursula.raft.v1;

import "durable.proto";

message RaftRpcEnvelopeV1 {
  uint32 raft_group_id = 1;
  uint64 node_id = 2;
  uint32 protocol_version = 3;
  oneof payload {
    RaftAppendEntriesRequestV1 append_entries = 4;
    RaftVoteRequestV1 vote = 5;
  }
}

message RaftRpcAckV1 {
  oneof payload {
    RaftAppendEntriesResponseV1 append_entries = 1;
    RaftVoteResponseV1 vote = 2;
  }
}

message RaftFullSnapshotRequestV1 {
  uint32 raft_group_id = 1;
  uint64 node_id = 2;
  uint32 protocol_version = 3;
  VoteV1 vote = 4;
  SnapshotMetaV1 snapshot_meta = 5;
  bytes snapshot_payload = 6;
}

message RaftFullSnapshotAckV1 {
  RaftSnapshotResponseV1 response = 1;
}

message GroupWriteRequestV1 {
  uint32 raft_group_id = 1;
  uint32 core_id = 2;
  uint32 shard_id = 3;
  repeated bytes command_payloads = 4;
}

message GroupWriteResultV1 {
  bool ok = 1;
  bytes payload = 2;
}

message GroupWriteResponseV1 {
  repeated GroupWriteResultV1 results = 1;
}

message GroupReadRequestV1 {
  uint32 raft_group_id = 1;
  uint32 core_id = 2;
  uint32 shard_id = 3;
  string bucket_id = 4;
  string stream_id = 5;
  uint64 now_ms = 6;
  oneof read {
    HeadStreamReadV1 head = 7;
    ReadStreamReadV1 read_stream = 8;
    GetStreamAttrsReadV1 get_stream_attrs = 9;
  }
}

message HeadStreamReadV1 {}

message GetStreamAttrsReadV1 {}

message ReadStreamReadV1 {
  uint64 offset = 1;
  uint64 max_len = 2;
}

message GroupReadResponseV1 {
  bool ok = 1;
  bytes payload = 2;
}

message LogIdV1 {
  uint64 term = 1;
  uint64 node_id = 2;
  uint64 index = 3;
}

message VoteV1 {
  uint64 term = 1;
  uint64 node_id = 2;
  bool committed = 3;
}

message BasicNodeV1 {
  string addr = 1;
}

message MembershipConfigV1 {
  repeated uint64 node_ids = 1;
}

message MembershipNodeV1 {
  uint64 node_id = 1;
  BasicNodeV1 node = 2;
}

message MembershipEntryV1 {
  repeated MembershipConfigV1 configs = 1;
  repeated MembershipNodeV1 nodes = 2;
}

message StoredMembershipV1 {
  LogIdV1 log_id = 1;
  MembershipEntryV1 membership = 2;
}

message SnapshotMetaV1 {
  LogIdV1 last_log_id = 1;
  StoredMembershipV1 last_membership = 2;
  string snapshot_id = 3;
}

message BlankEntryV1 {}

message StoredLogEntryV1 {
  LogIdV1 log_id = 1;
  oneof payload {
    BlankEntryV1 blank = 2;
    ursula.durable.v1.RaftGroupCommandV1 normal = 3;
    MembershipEntryV1 membership = 4;
  }
}

message SaveVoteRecordV1 {
  VoteV1 vote = 1;
}

message SaveCommittedRecordV1 {
  LogIdV1 committed = 1;
}

message AppendRecordV1 {
  repeated StoredLogEntryV1 entries = 1;
}

message TruncateAfterRecordV1 {
  LogIdV1 last_log_id = 1;
}

message PurgeRecordV1 {
  LogIdV1 log_id = 1;
}

message RaftGroupLogRecordV1 {
  oneof operation {
    SaveVoteRecordV1 save_vote = 1;
    SaveCommittedRecordV1 save_committed = 2;
    AppendRecordV1 append = 3;
    TruncateAfterRecordV1 truncate_after = 4;
    PurgeRecordV1 purge = 5;
  }
}

message CoreJournalRecordV1 {
  uint32 group_id = 1;
  RaftGroupLogRecordV1 record = 2;
}

message RaftAppendEntriesRequestV1 {
  VoteV1 vote = 1;
  LogIdV1 prev_log_id = 2;
  repeated StoredLogEntryV1 entries = 3;
  LogIdV1 leader_commit = 4;
}

message RaftAppendEntriesResponseV1 {
  oneof response {
    RaftAppendSuccessV1 success = 1;
    RaftAppendPartialSuccessV1 partial_success = 2;
    RaftAppendConflictV1 conflict = 3;
    RaftAppendHigherVoteV1 higher_vote = 4;
  }
}

message RaftAppendSuccessV1 {}

message RaftAppendPartialSuccessV1 {
  LogIdV1 log_id = 1;
}

message RaftAppendConflictV1 {}

message RaftAppendHigherVoteV1 {
  VoteV1 vote = 1;
}

message RaftVoteRequestV1 {
  VoteV1 vote = 1;
  LogIdV1 last_log_id = 2;
}

message RaftVoteResponseV1 {
  VoteV1 vote = 1;
  bool vote_granted = 2;
  LogIdV1 last_log_id = 3;
}

message RaftSnapshotResponseV1 {
  VoteV1 vote = 1;
}

message RaftTransferLeaderRequestV1 {
  uint32 raft_group_id = 1;
  uint64 node_id = 2;
  uint32 protocol_version = 3;
  VoteV1 from_leader = 4;
  uint64 to_node_id = 5;
  LogIdV1 last_log_id = 6;
}

message RaftTransferLeaderAckV1 {}

message HeadStreamResponsePayloadV1 {
  uint32 core_id = 1;
  uint32 shard_id = 2;
  uint32 raft_group_id = 3;
  string content_type = 4;
  uint64 tail_offset = 5;
  bool closed = 6;
  optional uint64 stream_ttl_seconds = 7;
  optional uint64 stream_expires_at_ms = 8;
  optional uint64 snapshot_offset = 9;
  string integrity_live_setsum = 10;
  string integrity_evicted_setsum = 11;
  string integrity_total_setsum = 12;
  uint64 integrity_live_start_offset = 13;
  uint64 integrity_live_records = 14;
  uint64 integrity_evicted_records = 15;
  uint64 integrity_total_records = 16;
  uint64 cold_hot_start_offset = 17;
}

message ReadStreamResponsePayloadV1 {
  uint32 core_id = 1;
  uint32 shard_id = 2;
  uint32 raft_group_id = 3;
  uint64 offset = 4;
  uint64 next_offset = 5;
  string content_type = 6;
  bytes payload = 7;
  bool up_to_date = 8;
  bool closed = 9;
}

message GetStreamAttrsResponsePayloadV1 {
  uint32 core_id = 1;
  uint32 shard_id = 2;
  uint32 raft_group_id = 3;
  optional bytes attrs_json = 4;
}

service RaftInternal {
  rpc Append(RaftRpcEnvelopeV1) returns (RaftRpcAckV1);
  rpc Vote(RaftRpcEnvelopeV1) returns (RaftRpcAckV1);
  rpc FullSnapshot(RaftFullSnapshotRequestV1) returns (RaftFullSnapshotAckV1);
  rpc GroupWrite(GroupWriteRequestV1) returns (GroupWriteResponseV1);
  rpc GroupRead(GroupReadRequestV1) returns (GroupReadResponseV1);
  rpc TransferLeader(RaftTransferLeaderRequestV1) returns (RaftTransferLeaderAckV1);
}
