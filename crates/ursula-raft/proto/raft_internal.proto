syntax = "proto3";

package ursula.raft.v1;

// Raft RPC envelopes keep a plain proto preamble (protocol version, group id,
// target node) so routing and validation never decode the payload. The payload
// itself is opaque MessagePack produced by the serde derives of openraft's own
// request/response types (see `codec::encode_wire`).

message RaftRpcEnvelopeV1 {
  uint32 raft_group_id = 1;
  uint64 node_id = 2;
  uint32 protocol_version = 3;
  // MessagePack-encoded openraft `AppendEntriesRequest` (Append RPC) or
  // `VoteRequest` (Vote RPC).
  bytes payload = 4;
}

message RaftRpcAckV1 {
  // MessagePack-encoded openraft `AppendEntriesResponse` (Append RPC) or
  // `VoteResponse` (Vote RPC).
  bytes payload = 1;
}

message RaftFullSnapshotRequestV1 {
  uint32 raft_group_id = 1;
  uint64 node_id = 2;
  uint32 protocol_version = 3;
  // MessagePack-encoded openraft `Vote`.
  bytes vote = 4;
  // MessagePack-encoded openraft `SnapshotMeta`.
  bytes snapshot_meta = 5;
  bytes snapshot_payload = 6;
}

message RaftFullSnapshotAckV1 {
  // MessagePack-encoded openraft `SnapshotResponse`.
  bytes response = 1;
}

message RaftTransferLeaderRequestV1 {
  uint32 raft_group_id = 1;
  uint64 node_id = 2;
  uint32 protocol_version = 3;
  // MessagePack-encoded openraft `TransferLeaderRequest`.
  bytes request = 4;
}

message RaftTransferLeaderAckV1 {}

message GroupWriteRequestV1 {
  uint32 raft_group_id = 1;
  uint32 core_id = 2;
  uint32 shard_id = 3;
  repeated bytes command_payloads = 4;
}

message GroupWriteResultV1 {
  bool ok = 1;
  bytes payload = 2;
}

message GroupWriteResponseV1 {
  repeated GroupWriteResultV1 results = 1;
}

message GroupReadRequestV1 {
  uint32 raft_group_id = 1;
  uint32 core_id = 2;
  uint32 shard_id = 3;
  string bucket_id = 4;
  string stream_id = 5;
  uint64 now_ms = 6;
  oneof read {
    HeadStreamReadV1 head = 7;
    ReadStreamReadV1 read_stream = 8;
    GetStreamAttrsReadV1 get_stream_attrs = 9;
  }
}

message HeadStreamReadV1 {}

message GetStreamAttrsReadV1 {}

message ReadStreamReadV1 {
  uint64 offset = 1;
  uint64 max_len = 2;
  optional uint64 record = 3;
  optional uint64 max_records = 4;
}

message GroupReadResponseV1 {
  bool ok = 1;
  bytes payload = 2;
}

service RaftInternal {
  rpc Append(RaftRpcEnvelopeV1) returns (RaftRpcAckV1);
  rpc Vote(RaftRpcEnvelopeV1) returns (RaftRpcAckV1);
  rpc FullSnapshot(RaftFullSnapshotRequestV1) returns (RaftFullSnapshotAckV1);
  rpc GroupWrite(GroupWriteRequestV1) returns (GroupWriteResponseV1);
  rpc GroupRead(GroupReadRequestV1) returns (GroupReadResponseV1);
  rpc TransferLeader(RaftTransferLeaderRequestV1) returns (RaftTransferLeaderAckV1);
}
