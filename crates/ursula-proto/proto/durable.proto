syntax = "proto3";

package ursula.durable.v1;

message BucketStreamIdV1 {
  string bucket_id = 1;
  string stream_id = 2;
}

message ProducerRequestV1 {
  string producer_id = 1;
  uint64 producer_epoch = 2;
  uint64 producer_seq = 3;
}

message ExternalPayloadRefV1 {
  string s3_path = 1;
  uint64 payload_len = 2;
  uint64 object_size = 3;
}

message ColdChunkRefV1 {
  uint64 start_offset = 1;
  uint64 end_offset = 2;
  string s3_path = 3;
  uint64 object_size = 4;
}

message ShardPlacementV1 {
  uint32 core_id = 1;
  uint32 shard_id = 2;
  uint32 raft_group_id = 3;
}

message GroupLeaderHintV1 {
  optional uint64 node_id = 1;
  optional string address = 2;
}

message GroupEngineErrorV1 {
  string message = 1;
  optional StreamErrorCodeV1 code = 2;
  optional uint64 next_offset = 3;
  GroupLeaderHintV1 leader_hint = 4;
}

enum StreamErrorCodeV1 {
  STREAM_ERROR_CODE_UNSPECIFIED = 0;
  STREAM_ERROR_CODE_INVALID_BUCKET_ID = 1;
  STREAM_ERROR_CODE_INVALID_STREAM_ID = 2;
  STREAM_ERROR_CODE_BUCKET_NOT_FOUND = 3;
  STREAM_ERROR_CODE_BUCKET_NOT_EMPTY = 4;
  STREAM_ERROR_CODE_STREAM_NOT_FOUND = 5;
  STREAM_ERROR_CODE_STREAM_GONE = 6;
  STREAM_ERROR_CODE_STREAM_ALREADY_EXISTS_CONFLICT = 7;
  STREAM_ERROR_CODE_MISSING_CONTENT_TYPE = 8;
  STREAM_ERROR_CODE_CONTENT_TYPE_MISMATCH = 9;
  STREAM_ERROR_CODE_EMPTY_APPEND = 10;
  STREAM_ERROR_CODE_STREAM_CLOSED = 11;
  STREAM_ERROR_CODE_STREAM_SEQ_CONFLICT = 12;
  STREAM_ERROR_CODE_INVALID_PRODUCER = 13;
  STREAM_ERROR_CODE_PRODUCER_EPOCH_STALE = 14;
  STREAM_ERROR_CODE_PRODUCER_SEQ_CONFLICT = 15;
  STREAM_ERROR_CODE_INVALID_RETENTION = 16;
  STREAM_ERROR_CODE_INVALID_FORK = 17;
  STREAM_ERROR_CODE_OFFSET_OUT_OF_RANGE = 18;
  STREAM_ERROR_CODE_INVALID_COLD_FLUSH = 19;
  STREAM_ERROR_CODE_INVALID_SNAPSHOT = 20;
  STREAM_ERROR_CODE_SNAPSHOT_NOT_FOUND = 21;
  STREAM_ERROR_CODE_SNAPSHOT_CONFLICT = 22;
}

message RaftGroupCommandV1 {
  oneof command {
    CreateStreamCommandV1 create_stream = 1;
    CreateExternalCommandV1 create_external = 2;
    AppendCommandV1 append = 3;
    AppendExternalCommandV1 append_external = 4;
    AppendBatchCommandV1 append_batch = 5;
    PublishSnapshotCommandV1 publish_snapshot = 6;
    TouchStreamAccessCommandV1 touch_stream_access = 7;
    AddForkRefCommandV1 add_fork_ref = 8;
    ReleaseForkRefCommandV1 release_fork_ref = 9;
    FlushColdCommandV1 flush_cold = 10;
    CloseStreamCommandV1 close_stream = 11;
    DeleteStreamCommandV1 delete_stream = 12;
    BatchCommandV1 batch = 13;
    AckColdGcCommandV1 ack_cold_gc = 14;
  }
}

message CreateStreamCommandV1 {
  BucketStreamIdV1 stream_id = 1;
  string content_type = 2;
  bytes initial_payload = 3;
  bool close_after = 4;
  optional string stream_seq = 5;
  ProducerRequestV1 producer = 6;
  optional uint64 stream_ttl_seconds = 7;
  optional uint64 stream_expires_at_ms = 8;
  BucketStreamIdV1 forked_from = 9;
  optional uint64 fork_offset = 10;
  uint64 now_ms = 11;
}

message CreateExternalCommandV1 {
  BucketStreamIdV1 stream_id = 1;
  string content_type = 2;
  ExternalPayloadRefV1 initial_payload = 3;
  bool close_after = 4;
  optional string stream_seq = 5;
  ProducerRequestV1 producer = 6;
  optional uint64 stream_ttl_seconds = 7;
  optional uint64 stream_expires_at_ms = 8;
  BucketStreamIdV1 forked_from = 9;
  optional uint64 fork_offset = 10;
  uint64 now_ms = 11;
}

message AppendCommandV1 {
  BucketStreamIdV1 stream_id = 1;
  string content_type = 2;
  bytes payload = 3;
  bool close_after = 4;
  optional string stream_seq = 5;
  ProducerRequestV1 producer = 6;
  uint64 now_ms = 7;
}

message AppendExternalCommandV1 {
  BucketStreamIdV1 stream_id = 1;
  string content_type = 2;
  ExternalPayloadRefV1 payload = 3;
  bool close_after = 4;
  optional string stream_seq = 5;
  ProducerRequestV1 producer = 6;
  uint64 now_ms = 7;
}

message AppendBatchCommandV1 {
  BucketStreamIdV1 stream_id = 1;
  string content_type = 2;
  repeated bytes payloads = 3;
  ProducerRequestV1 producer = 4;
  uint64 now_ms = 5;
}

message PublishSnapshotCommandV1 {
  BucketStreamIdV1 stream_id = 1;
  uint64 snapshot_offset = 2;
  string content_type = 3;
  bytes payload = 4;
  uint64 now_ms = 5;
}

message TouchStreamAccessCommandV1 {
  BucketStreamIdV1 stream_id = 1;
  uint64 now_ms = 2;
  bool renew_ttl = 3;
}

message AddForkRefCommandV1 {
  BucketStreamIdV1 stream_id = 1;
  uint64 now_ms = 2;
}

message ReleaseForkRefCommandV1 {
  BucketStreamIdV1 stream_id = 1;
}

message FlushColdCommandV1 {
  BucketStreamIdV1 stream_id = 1;
  ColdChunkRefV1 chunk = 2;
}

message CloseStreamCommandV1 {
  BucketStreamIdV1 stream_id = 1;
  optional string stream_seq = 2;
  ProducerRequestV1 producer = 3;
  uint64 now_ms = 4;
}

message DeleteStreamCommandV1 {
  BucketStreamIdV1 stream_id = 1;
}

message BatchCommandV1 {
  repeated RaftGroupCommandV1 commands = 1;
}

message AckColdGcCommandV1 {
  uint64 up_to_seq = 1;
}

message RaftGroupResponseV1 {
  oneof response {
    BlankResponseV1 blank = 1;
    MembershipResponseV1 membership = 2;
    WriteAppliedResponseV1 write_applied = 3;
    GroupEngineErrorV1 write_rejected = 4;
  }
}

message BlankResponseV1 {}

message MembershipResponseV1 {}

message WriteAppliedResponseV1 {
  oneof response {
    CreateStreamResponseV1 create_stream = 1;
    AppendResponseV1 append = 2;
    AppendBatchResponseV1 append_batch = 3;
    PublishSnapshotResponseV1 publish_snapshot = 4;
    TouchStreamAccessResponseV1 touch_stream_access = 5;
    ForkRefResponseV1 add_fork_ref = 6;
    ForkRefResponseV1 release_fork_ref = 7;
    FlushColdResponseV1 flush_cold = 8;
    CloseStreamResponseV1 close_stream = 9;
    DeleteStreamResponseV1 delete_stream = 10;
    BatchResponseV1 batch = 11;
    AckColdGcResponseV1 ack_cold_gc = 12;
  }
}

message CreateStreamResponseV1 {
  ShardPlacementV1 placement = 1;
  uint64 next_offset = 2;
  bool closed = 3;
  bool already_exists = 4;
  uint64 group_commit_index = 5;
}

message AppendResponseV1 {
  ShardPlacementV1 placement = 1;
  uint64 start_offset = 2;
  uint64 next_offset = 3;
  uint64 stream_append_count = 4;
  uint64 group_commit_index = 5;
  bool closed = 6;
  bool deduplicated = 7;
  ProducerRequestV1 producer = 8;
}

message AppendBatchResponseV1 {
  ShardPlacementV1 placement = 1;
  repeated AppendResultV1 items = 2;
}

message AppendResultV1 {
  oneof result {
    AppendResponseV1 ok = 1;
    GroupEngineErrorV1 err = 2;
  }
}

message PublishSnapshotResponseV1 {
  ShardPlacementV1 placement = 1;
  uint64 snapshot_offset = 2;
  uint64 group_commit_index = 3;
}

message TouchStreamAccessResponseV1 {
  ShardPlacementV1 placement = 1;
  bool changed = 2;
  bool expired = 3;
  uint64 group_commit_index = 4;
}

message ForkRefResponseV1 {
  ShardPlacementV1 placement = 1;
  uint64 fork_ref_count = 2;
  bool hard_deleted = 3;
  BucketStreamIdV1 parent_to_release = 4;
  uint64 group_commit_index = 5;
}

message FlushColdResponseV1 {
  ShardPlacementV1 placement = 1;
  uint64 hot_start_offset = 2;
  uint64 group_commit_index = 3;
}

message CloseStreamResponseV1 {
  ShardPlacementV1 placement = 1;
  uint64 next_offset = 2;
  uint64 group_commit_index = 3;
  bool deduplicated = 4;
}

message DeleteStreamResponseV1 {
  ShardPlacementV1 placement = 1;
  uint64 group_commit_index = 2;
  bool hard_deleted = 3;
  BucketStreamIdV1 parent_to_release = 4;
}

message AckColdGcResponseV1 {
  ShardPlacementV1 placement = 1;
  uint64 removed = 2;
  uint64 group_commit_index = 3;
}

message BatchResponseV1 {
  repeated GroupWriteResultV1 items = 1;
}

message GroupWriteResultV1 {
  oneof result {
    WriteAppliedResponseV1 ok = 1;
    GroupEngineErrorV1 err = 2;
  }
}
